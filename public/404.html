<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Warung POS</title>
    <script type="text/javascript">
      // Redirect to the hash-based URL
      // Example: /SIWARUNG/setting -> /SIWARUNG/#/setting
      var path = window.location.pathname;
      var repoName = '/SIWARUNG'; // Base path
      
      // If the path starts with /SIWARUNG/ but is not just /SIWARUNG/
      if (path.startsWith(repoName) && path !== repoName && path !== repoName + '/') {
        var route = path.substring(repoName.length);
        window.location.replace(window.location.origin + repoName + '/#' + route + window.location.search + window.location.hash);
      } else {
        window.location.replace(window.location.origin + repoName + '/');
      }
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
